<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - UniEvents</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <h1>Register</h1>
            <p>Create your account to join the UniEvents community!</p>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="tab-group">
                <button class="tab-btn active" onclick="showTab('student')">Student</button>
                <button class="tab-btn" onclick="showTab('admin')">Admin</button>
            </div>

            <div class="tab-content" id="student-content">
                <form action="/register/student" method="post">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Your full name" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="student@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create a password" required />
                    </div>
                    <div class="form-group">
                        <label>College ID <small>(9 digits, starts with 2)</small></label>
                        <input type="text" name="collegeId"
                            placeholder="e.g. 201234567"
                            pattern="2\d{8}"
                            maxlength="9"
                            title="Must be 9 digits and start with 2"
                            required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Register as Student</button>
                </form>
            </div>

            <div id="tab-admin" style="display:none;">
                <form action="/register/admin" method="post">
                    <div class="form-group">
                        <label>Admin Username</label>
                        <input type="text" name="name" placeholder="ex: adminJohn" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="admin@university.edu" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create a password" required />
                    </div>
                    <button type="submit" class="btn btn-secondary btn-full">Register as Admin</button>
                </form>
            </div>

            <p class="auth-link">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('student-content').style.display = tab === 'student' ? 'block' : 'none';
            document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
        }
    </script>

</body>
</html>
