<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
    <title>Student Dashboard - UniEvents</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div th:replace="~{fragments/navbar::navbar}"></div>
        <div class = "page-container">
            <div class="page-header">
                <div>
                    <h2>Upcoming Events</h2>
                <p>Browse and book university events</p>
                </div>
            </div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                <p>No upcoming events at the moment. Please check back later.</p></div>  
            <div class="card-actions">
                <span th:if="${bookedMap[event.id]}" class="badge badge-cooked">Booked</span>
            </div>
            <div class="events-grid">
                <div th:each="event : ${events}" class="event-card">                
                <div class="card-header">
                    <span th:if="${event.status.name() == 'POSTPONED'}" class="badge badge-warning">POSTPONED</span>
                    <span th:if="${event.status.name() == 'UPCOMING'}" class="badge badge-success">UPCOMING</span>
                </div>
            
            <h3 class="event-title" th:text="${event.title}"></h3>
            <p class="event-desc" th:text="${event.description}"></p>
            <div class="event-meta">
                <span>&#128197; <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}"></span></span>
                <span>&#128205; <span th:text="${event.location}"></span></span>
                </div>
                <div class="event-footer">
                    <div class="event-price">
                        <span th:if="${event.price == 0}" class="price-free">Free</span>
                        <span th:if="${event.price > 0}" class="price-paid" th:text="'$' + ${event.price}"></span>
                    </div>
                    <span th:if="${event.unlimited}" class="seats-unlimited">Unlimited Seats</span>
                    <span th:if="${!event.unlimited and event.remainingSeats>0}" class="seats-remaining">Remaining Seats: 
                        <span th:text="${event.remainingSeats}"></span></span>
                    <span th:if="${!event.unlimited and event.remainingSeats <= 0}" class="seats-full">Fully Booked</span>    
                </div>
               <div class="event-meta">
                <span th:if="${ratingCountMap[event.id]>0}"
                    th:text="'Rating: ' + ${averageRatingMap[event.id]} + '/5 (' + ${ratingCountMap[event.id]} + ' review(s))'"></span>
               </div>
               <div th:if="${event.status.name() == 'POSTPONED'}" class="notification-bar">
                    This event has been postponed. New date shown above.
                </div>
            <div class="card-actions">
                <span th:if="${bookedMap[event.id]}" class="badge badge-cooked">Booked</span>
            <form th:if="${!bookedMap[event.id]}" th:action="@{/student/book/{id}(id=${event.id})}" method="post">
                <button type="submit" class="btn btn-primary" th:disabled="${!event.hasAvailableSeats()}"> 
                    <span th:if="${event.hasAvailableSeats()}">Book Now</span>
                    <span th:if="${!event.hasAvailableSeats()}">Fully Booked</span> 
            </form>
            <button th:if="${bookedMap[event.id] and canRateMap[event.id] and !ratedMap[event.id]}"
                            class="btn btn-outline rate-btn"
                            th:data-event-id="${event.id}"
                            th:data-event-name="${event.name}">
                        Rate
                    </button>
                    <span th:if="${ratedMap[event.id]}" class="badge badge-rated">Rated</span>
                    <span th:if="${bookedMap[event.id] and !canRateMap[event.id] and !ratedMap[event.id]}"
                          class="badge badge-grey">Rate after the event </span>
                    </div> 
               </div>
            </div>
        </div>
        
        <div id="ratingModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Rate: <span id="modalEventName"></span></h3>
            <form id="ratingForm" method="post">
                <div class="form-group">
                    <label>Stars (1 to 5)</label>
                    <div class="star-selector">
                        <input type="radio" name="stars" value="5" id="s5"><label for="s5">&#9733;</label>
                        <input type="radio" name="stars" value="4" id="s4"><label for="s4">&#9733;</label>
                        <input type="radio" name="stars" value="3" id="s3"><label for="s3">&#9733;</label>
                        <input type="radio" name="stars" value="2" id="s2"><label for="s2">&#9733;</label>
                        <input type="radio" name="stars" value="1" id="s1"><label for="s1">&#9733;</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Comment (optional)</label>
                    <textarea name="comment" rows="3" placeholder="Share your experience..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Submit Rating</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('.rate-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var eventId   = this.getAttribute('data-event-id');
                var eventName = this.getAttribute('data-event-name');
                document.getElementById('modalEventName').textContent = eventName;
                document.getElementById('ratingForm').action = '/student/rate/' + eventId;
                document.getElementById('ratingModal').style.display = 'flex';
            });
        });
        function closeModal() {
            document.getElementById('ratingModal').style.display = 'none';
        }
    </script>
    </body>
</html>
