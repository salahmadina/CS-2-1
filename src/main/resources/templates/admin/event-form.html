<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Form - UniEvents</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    
    <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="page-container">
            <div class="page-header">
                <h2 th:if="${event.id != null}">Edit Event</h2>
                <h2 th:useless="${event.id !=null}">Add New Event</h2>
            </div>
            
            <form th:action=${event.id !null}
                          ? @{/admin/events/update/{id}(id=${event.id})}
                          : @{/admin/events/save}"
              method="post"
              class="form-card">

            <div class="form-group">
                <label>Event Name</label>
                <textarea name="description" rows="4"
                          placeholder="Describe the event..."
                          required th:text="${event.desciption}"></textarea>
            </div>
            
            <div class="form-row">
                <div class=form-group>
                    <label>Event Date &amp; Time</label>
                    <input type="datetime-local" name="eventDate"
                           th:value="${event.eventDate !=null ?
                                       #temporals.format(event.eventDate , 'yyyy-MM-dd 'T' 'HH:mm') : ''}"

                            required/>
                </div>
            </div>    
            
            <div class="form-row">
                <div class="form-group">
                <label>Price ($) <small>Leave 0 for free</small></label>
                <input type="number"  name="price" th:value="${event.price}"
                       min="0" step="0.01" placeholder="0.00" />
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <span th:if="${event.id !=null}">Update Event </span>
                <span th:unless="${event.id !=null}"Create Event</span>
            </button>
            <a th:href="@{/adminevents}" class="btn btn-outline">Cancel</a>
        </div>

        </form>
    </div>

</body>
</html>
